<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Inventory Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>☕ Coffee Inventory Management</h1>
  </header>

  <main class="container">
    <section class="inventory-form">
      <h2>Add Coffee Item</h2>
      <input type="text" id="itemName" placeholder="Coffee Name">
      <input type="number" id="itemQuantity" placeholder="Quantity">
      <button id="addBtn">Add Item</button>
    </section>

    <section>
      <table id="inventoryTable">
        <thead>
          <tr>
            <th>Coffee Name</th>
            <th>Quantity</th>
          </tr>
        </thead>
        <tbody>
          
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
