<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

html,body{
  height:100%;
}

body{
  display:flex;
  background:#8c4f22;
}

/* MAIN CONTAINER FULLSCREEN */
.container{
  width:100%;
  height:100vh;
  display:flex;
}

/* LEFT SIDE */
.left{
  flex:1;
  background:#8c4f22;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px;
  color:white;
}

.left h1{
  font-size:48px;
  letter-spacing:2px;
}

.left p{
  margin:10px 0 40px;
  font-size:20px;
  color:#f1d2b8;
}

/* INPUT */
.input-group{
  background:#eeeeee;
  display:flex;
  align-items:center;
  padding:16px 18px;
  border-radius:10px;
  margin-bottom:22px;
  box-shadow:0 4px 8px rgba(0,0,0,0.25);
}

.input-group input{
  flex:1;
  border:none;
  outline:none;
  font-size:17px;
  background:transparent;
}

.input-group i{
  font-size:20px;
  color:#333;
  cursor:pointer;
}

/* TERMS */
.terms{
  margin:10px 0 25px;
  font-size:15px;
}

.terms span{
  color:#ff6b2d;
  cursor:pointer;
  font-weight:600;
}

/* BUTTON */
.signup-btn{
  width:100%;
  padding:16px;
  background:#a6a345;
  border:none;
  border-radius:10px;
  font-size:20px;
  font-weight:600;
  color:white;
  cursor:pointer;
  box-shadow:0 6px 12px rgba(0,0,0,0.35);
  transition:0.3s;
}

.signup-btn:hover{
  background:#8e8c3c;
  transform:translateY(-3px);
}

/* RIGHT SIDE */
.right{
  flex:1;
  background:#4a4a0f;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:right;
  overflow:hidden;
}

.right img{
  height:100%;
  object-fit:cover;
}

.right h2{
  position:absolute;
  right:-100px;
  transform:rotate(90deg);
  font-size:130px;
  font-weight:900;
  color:#f4f0e8;
  letter-spacing:12px;
  pointer-events:none;
}

/* RESPONSIVE */
@media(max-width:900px){
  .container{
    flex-direction:column;
  }

  .left{
    padding:50px 30px;
  }

  .right{
    height:300px;
  }

  .right h2{
    transform:none;
    right:20px;
    bottom:20px;
    font-size:60px;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="left">
    <h1>REGISTER</h1>
    <p>Create New Account</p>

    <div class="input-group">
      <input type="text" placeholder="Username">
      <i class="fa-regular fa-user"></i>
    </div>

    <div class="input-group">
      <input type="email" placeholder="Email Address">
      <i class="fa-regular fa-envelope"></i>
    </div>

    <div class="input-group">
      <input type="password" placeholder="Password">
      <i class="fa-regular fa-eye-slash"></i>
    </div>

    <div class="input-group">
      <input type="password" placeholder="Confirm Password">
      <i class="fa-regular fa-eye-slash"></i>
    </div>

    <div class="terms">
      <input type="checkbox"> I agree to the 
      <span>Terms & Privacy</span>
    </div>

    <button class="signup-btn">Sign Up</button>
  </div>

  <div class="right">
    <!-- Replace with your image -->
    <img src="reg.png" alt="Coffee">
    <h2></h2>
  </div>

</div>

</body>
</html>
